<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclaimng - Integration CMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        :root {
            --canvas-bg: #F8FAF9;
            --panel-bg: #FFFFFF;
            --text-primary: #1F2937;
            --text-muted: #6B7280;
            --primary-accent: #2C5E43;
            --border-color: #E2E8F0;
            --radius-normal: 10px;
            --radius-large: 12px;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--canvas-bg); color: var(--text-primary); }
    </style>
</head>
<body class="flex min-h-screen antialiased selection:bg-[var(--primary-accent)] selection:text-white">

    <!-- Navigation Shell -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 bg-[var(--panel-bg)] border-r border-[var(--border-color)] w-[72px] sm:w-[260px] transition-all duration-300 z-50 flex flex-col overflow-hidden">
        <div class="h-16 flex items-center px-5 border-b border-[var(--border-color)] justify-between">
            <a href="admin-queue" class="flex items-center gap-2 overflow-hidden">
                <iconify-icon icon="solar:safe-square-bold-duotone" class="text-[var(--primary-accent)]" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-base font-semibold tracking-tighter sidebar-text hidden sm:block whitespace-nowrap text-[var(--primary-accent)]">ADMIN</span>
            </a>
        </div>
        <nav class="flex-1 py-6 px-3 flex flex-col gap-1">
            <a href="admin-queue" class="flex items-center gap-3 px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors">
                <iconify-icon icon="solar:clipboard-list-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">Compliance Queue</span>
            </a>
            <a href="admin-cms" class="flex items-center gap-3 px-3 py-2 bg-[var(--canvas-bg)] text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors">
                <iconify-icon icon="solar:settings-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">Integration CMS</span>
            </a>
            <a href="dispute" class="flex items-center gap-3 px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors">
                <iconify-icon icon="solar:danger-triangle-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">Dispute Center</span>
            </a>
            <a href="auth" class="flex items-center gap-3 px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors mt-auto">
                <iconify-icon icon="solar:logout-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">Sign Out</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 ml-[72px] sm:ml-[260px] p-8 max-w-[1200px] mx-auto min-h-screen">
        
        <!-- Breadcrumbs -->
        <div class="flex items-center space-x-2 text-sm text-[var(--text-muted)] mb-6">
            <a href="admin-queue" class="hover:text-[var(--text-primary)] transition-colors">Home</a>
            <span>/</span>
            <span class="text-[var(--text-primary)]">Integration CMS</span>
        </div>

        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-8 gap-4">
            <h1 class="text-2xl font-semibold tracking-tight text-[var(--text-primary)]">Core API Integrations</h1>
            <div class="text-sm text-[var(--text-muted)]">Manage node connections and credentials</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- NIBSS Integration -->
            <div class="bg-[var(--panel-bg)] border border-[var(--border-color)] rounded-[var(--radius-large)] p-6 flex flex-col shadow-none">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-[var(--radius-normal)] bg-[#F8FAF9] border border-[var(--border-color)] flex items-center justify-center text-[var(--primary-accent)]">
                        <iconify-icon icon="solar:card-send-linear" style="font-size: 1.5rem;"></iconify-icon>
                    </div>
                    <div>
                        <h3 class="text-base font-semibold text-[var(--text-primary)]">NIBSS e-DMMS Endpoint</h3>
                        <p class="text-xs text-[var(--text-muted)]">Active • Last ping: 2 mins ago</p>
                    </div>
                </div>
                <div class="flex flex-col gap-4 flex-1">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-medium text-[var(--text-muted)] uppercase tracking-wide">API Key</label>
                        <input type="password" value="************************" disabled class="w-full px-3 py-2 text-sm bg-[var(--canvas-bg)] border border-[var(--border-color)] rounded-[var(--radius-normal)] text-[var(--text-muted)]">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-medium text-[var(--text-muted)] uppercase tracking-wide">Webhook URL</label>
                        <input type="text" value="https://api.reclaimng.com/v1/nibss/webhook" class="w-full px-3 py-2 text-sm bg-transparent border border-[var(--border-color)] rounded-[var(--radius-normal)] outline-none focus:border-[var(--primary-accent)] text-[var(--text-primary)]">
                    </div>
                </div>
                <div class="flex justify-end mt-6">
                    <button class="bg-[var(--canvas-bg)] text-[var(--text-primary)] border border-[var(--border-color)] px-4 py-2 text-sm font-medium rounded-[var(--radius-normal)] hover:bg-gray-50 transition-colors">Rotate Keys</button>
                </div>
            </div>

            <!-- QoreID Integration -->
            <div class="bg-[var(--panel-bg)] border border-[var(--border-color)] rounded-[var(--radius-large)] p-6 flex flex-col shadow-none">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-10 h-10 rounded-[var(--radius-normal)] bg-[#F8FAF9] border border-[var(--border-color)] flex items-center justify-center text-[#B45309]">
                        <iconify-icon icon="solar:shield-check-linear" style="font-size: 1.5rem;"></iconify-icon>
                    </div>
                    <div>
                        <h3 class="text-base font-semibold text-[var(--text-primary)]">QoreID Verification Node</h3>
                        <p class="text-xs text-[var(--text-muted)]">Active • Last ping: 15 mins ago</p>
                    </div>
                </div>
                <div class="flex flex-col gap-4 flex-1">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-medium text-[var(--text-muted)] uppercase tracking-wide">API Key</label>
                        <input type="password" value="************************" disabled class="w-full px-3 py-2 text-sm bg-[var(--canvas-bg)] border border-[var(--border-color)] rounded-[var(--radius-normal)] text-[var(--text-muted)]">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-medium text-[var(--text-muted)] uppercase tracking-wide">Service Endpoints</label>
                        <input type="text" value="NIMC, Probate Registry, BVN" disabled class="w-full px-3 py-2 text-sm bg-[var(--canvas-bg)] border border-[var(--border-color)] rounded-[var(--radius-normal)] text-[var(--text-muted)]">
                    </div>
                </div>
                <div class="flex justify-end mt-6">
                    <button class="bg-[var(--canvas-bg)] text-[var(--text-primary)] border border-[var(--border-color)] px-4 py-2 text-sm font-medium rounded-[var(--radius-normal)] hover:bg-gray-50 transition-colors">Rotate Keys</button>
                </div>
            </div>

        </div>
    </main>

    <!-- Universal WhatsApp Float Node -->
    <a href="https://wa.me/2348135975351" target="_blank" class="fixed bottom-6 right-6 z-[9999] w-14 h-14 bg-[var(--primary-accent)] rounded-full flex items-center justify-center text-white border border-[var(--border-color)] shadow-none hover:scale-105 transition-transform animate-bounce hover:animate-none">
        <iconify-icon icon="solar:chat-round-line-linear" style="font-size: 1.5rem; stroke-width: 1.5;"></iconify-icon>
    </a>
</body>
</html>
