<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Session Guard — must be the FIRST script in <head> -->
    <script src="authGuard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reclaimng - Unified Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
        :root {
            --canvas-bg: #F8FAF9;
            --panel-bg: #FFFFFF;
            --text-primary: #1F2937;
            --text-muted: #6B7280;
            --primary-accent: #2C5E43;
            --border-color: #E2E8F0;
            --radius-normal: 10px;
            --radius-large: 12px;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--canvas-bg); color: var(--text-primary); }
    </style>
</head>
<body class="flex min-h-screen antialiased selection:bg-[var(--primary-accent)] selection:text-white">

    <!-- Navigation Shell -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 bg-[var(--panel-bg)] border-r border-[var(--border-color)] w-[72px] sm:w-[260px] transition-all duration-300 z-50 flex flex-col overflow-hidden">
        <div class="h-16 flex items-center px-5 border-b border-[var(--border-color)] justify-between">
            <a href="dashboard.html" class="flex items-center gap-2 overflow-hidden">
                <iconify-icon icon="solar:safe-square-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-base font-semibold tracking-tighter sidebar-text hidden sm:block whitespace-nowrap">RECLAIMNG</span>
            </a>
        </div>
        <nav class="flex-1 py-6 px-3 flex flex-col gap-1">
            <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors">
                <iconify-icon icon="solar:home-smile-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">Home</span>
            </a>
            <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors">
                <iconify-icon icon="solar:folder-with-files-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">My Recoveries</span>
            </a>
            <a href="vault.html" class="flex items-center gap-3 px-3 py-2 bg-[var(--canvas-bg)] text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors">
                <iconify-icon icon="solar:safe-2-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">Unified Vault</span>
            </a>
            <a href="auth.html" class="flex items-center gap-3 px-3 py-2 text-[var(--text-muted)] hover:text-[var(--text-primary)] rounded-[var(--radius-normal)] transition-colors mt-auto">
                <iconify-icon icon="solar:logout-linear" style="font-size: 1.25rem; stroke-width: 1.5;"></iconify-icon>
                <span class="text-sm font-medium sidebar-text hidden sm:block whitespace-nowrap">Sign Out</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 ml-[72px] sm:ml-[260px] p-8 sm:p-12 max-w-4xl mx-auto min-h-screen">
        
        <!-- Breadcrumbs -->
        <div class="flex items-center space-x-2 text-sm text-[var(--text-muted)] mb-6">
            <a href="dashboard.html" class="hover:text-[var(--text-primary)] transition-colors">Home</a>
            <span>/</span>
            <span class="text-[var(--text-primary)]">Unified Vault</span>
        </div>

        <div class="mb-12">
            <h1 class="text-2xl font-semibold tracking-tight text-[var(--text-primary)] mb-2">My Settled Assets</h1>
            <p class="text-sm text-[var(--text-muted)]">Your securely cleared financial transitions.</p>
        </div>

        <!-- Cards injected by hydrateVault() — loading state shown initially -->
        <div id="vault-cards-container" class="flex flex-col gap-6">
            <div id="vault-loading" class="bg-[var(--panel-bg)] border border-[var(--border-color)] rounded-[var(--radius-large)] p-10 text-center">
                <div class="flex items-center justify-center gap-2 text-sm text-[var(--text-muted)]">
                    <iconify-icon icon="solar:spinner-linear" class="animate-spin" style="font-size:1.25rem;"></iconify-icon>
                    Loading your settled assets…
                </div>
            </div>
        </div>

    </main>

    <!-- Universal WhatsApp Float Node -->
    <a href="https://wa.me/2348135975351" target="_blank" class="fixed bottom-6 right-6 z-[9999] w-14 h-14 bg-[var(--primary-accent)] rounded-full flex items-center justify-center text-white border border-[var(--border-color)] shadow-none hover:scale-105 transition-transform animate-bounce hover:animate-none">
        <iconify-icon icon="solar:chat-round-line-linear" style="font-size: 1.5rem; stroke-width: 1.5;"></iconify-icon>
    </a>

    <!-- Application Logic -->
    <script>
        async function downloadClearance(btn, reqId) {
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<iconify-icon icon="solar:spinner-linear" class="animate-spin"></iconify-icon> <span class="btn-label">Processing...</span>';
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const response = await fetch('/api/generate-inventory');
                if (!response.ok) throw new Error('API Error');
                const blob = await response.blob();
                
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Clearance_Report_${reqId}.pdf`;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(url);
                
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                showToast('Clearance document downloaded securely.', 'success');
                
            } catch (err) {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                showToast('Failed to download clearance document.', 'error');
            }
        }

        function showToast(message, type) {
            const container = document.createElement('div');
            container.className = `fixed top-6 right-6 p-4 rounded-xl shadow-lg border backdrop-blur-md z-50 transition-all ${
                type === 'error' ? 'bg-red-50 border-red-200 text-red-700' : 'bg-green-50 border-green-200 text-green-700'
            }`;
            container.innerHTML = `<p class="text-sm font-medium">${message}</p>`;
            document.body.appendChild(container);
            setTimeout(() => {
                container.style.opacity = '0';
                setTimeout(() => container.remove(), 300);
            }, 3500);
        }
    </script>

    <!-- ── Vault Data Hydration ───────────────────────────────────────────── -->
    <!-- Fetches settled estates from Supabase and renders asset cards.        -->
    <script type="module">
        // ── Format a date string as "Settled on Month DD, YYYY via NIBSS" ──
        function formatSettledDate(dateStr) {
            if (!dateStr) return 'Settlement date unavailable';
            const d = new Date(dateStr);
            if (isNaN(d.getTime())) return 'Settlement date unavailable';
            return 'Settled on ' + d.toLocaleDateString('en-NG', {
                year: 'numeric', month: 'long', day: 'numeric'
            }) + ' via NIBSS';
        }

        // ── Format currency from DB value ────────────────────────────────────
        function formatCurrency(value) {
            if (value === null || value === undefined) return '₦0.00 (Pending Assessment)';
            return '₦' + Number(value).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ── Build a single asset card ─────────────────────────────────────────
        function buildCard(estate) {
            const shortId  = 'REQ-' + estate.id.substring(0, 6).toUpperCase();
            const name     = estate.estate_name || 'Unnamed Estate';
            const dateStr  = formatSettledDate(estate.updated_at);
            const value    = formatCurrency(estate.total_asset_value);

            return `
            <div class="bg-[var(--panel-bg)] border border-[var(--border-color)] rounded-[var(--radius-large)] p-6 shadow-none flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-full bg-[#ECFDF5] border border-[#A7F3D0] flex items-center justify-center text-[var(--primary-accent)]">
                        <iconify-icon icon="solar:safe-circle-linear" style="font-size: 1.5rem;"></iconify-icon>
                    </div>
                    <div>
                        <div class="text-xs font-semibold text-[var(--text-muted)] uppercase tracking-wide mb-0.5">${shortId}</div>
                        <h3 class="text-lg font-semibold text-[var(--text-primary)]">${name}</h3>
                        <p class="text-xs text-[var(--text-muted)]">${dateStr}</p>
                    </div>
                </div>
                <div class="flex flex-col md:items-end gap-3 w-full md:w-auto">
                    <div class="text-xl font-bold text-[var(--text-primary)]">${value} <span class="text-sm font-medium text-[var(--text-muted)] ml-1">NET</span></div>
                    <button onclick="downloadClearance(this, '${shortId}')" class="w-full md:w-auto bg-[var(--canvas-bg)] text-[var(--text-primary)] border border-[var(--border-color)] px-4 py-2 text-sm font-medium rounded-[var(--radius-normal)] hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                        <iconify-icon icon="solar:document-text-linear"></iconify-icon> <span class="btn-label">Download Clearance PDF</span>
                    </button>
                </div>
            </div>`;
        }

        // ── Main: fetch and render ────────────────────────────────────────────
        async function hydrateVault() {
            const container = document.getElementById('vault-cards-container');
            if (!container) return;

            try {
                // 1. Get Supabase credentials from the env-driven config endpoint
                const cfgRes = await fetch('/api/config');
                if (!cfgRes.ok) throw new Error(`Config endpoint error: ${cfgRes.status}`);
                const cfg = await cfgRes.json();

                // 2. Resolve session
                const session = window.__reclaimSession;
                if (!session?.user?.id) throw new Error('No authenticated session found.');

                const userId      = session.user.id;
                const accessToken = session.access_token;

                // 3. Query only settled/verified estates for this user
                //    Filter: status=in.(settled,verified) to catch both terminal states
                const dbRes = await fetch(
                    `${cfg.supabaseUrl}/rest/v1/estates?user_id=eq.${userId}&status=in.(settled,verified)&select=id,estate_name,status,total_asset_value,updated_at&order=updated_at.desc`,
                    {
                        headers: {
                            'apikey':        cfg.supabaseAnonKey,
                            'Authorization': `Bearer ${accessToken}`,
                            'Content-Type':  'application/json',
                        },
                    }
                );

                if (!dbRes.ok) {
                    const errText = await dbRes.text();
                    throw new Error(`Database query failed (${dbRes.status}): ${errText}`);
                }

                const estates = await dbRes.json();

                // 4. Clear loading state
                container.innerHTML = '';

                if (!estates || estates.length === 0) {
                    // Clean empty state
                    container.innerHTML = `
                    <div class="bg-[var(--panel-bg)] border border-[var(--border-color)] rounded-[var(--radius-large)] p-16 text-center">
                        <div class="flex flex-col items-center gap-3 text-[var(--text-muted)]">
                            <iconify-icon icon="solar:safe-2-linear" style="font-size:3rem; opacity:0.35;"></iconify-icon>
                            <p class="text-sm font-semibold">No settled assets yet.</p>
                            <p class="text-xs max-w-xs mx-auto">You currently have no settled assets in your vault. Assets appear here once your recovery has been fully processed and cleared.</p>
                        </div>
                    </div>`;
                    return;
                }

                // 5. Render one card per settled estate
                estates.forEach(estate => {
                    container.insertAdjacentHTML('beforeend', buildCard(estate));
                });

            } catch (err) {
                console.error('[vault] Failed to load settled assets:', err);
                const container = document.getElementById('vault-cards-container');
                if (container) {
                    container.innerHTML = `
                    <div class="bg-[var(--panel-bg)] border border-[var(--border-color)] rounded-[var(--radius-large)] p-10 text-center text-sm text-red-500">
                        Failed to load vault data. Please refresh or contact support.
                    </div>`;
                }
            }
        }

        // Wait for authGuard session before querying (same pattern as dashboard)
        function waitForSession(callback, attempts = 0) {
            if (window.__reclaimSession?.user?.id) {
                callback();
            } else if (attempts < 20) {
                setTimeout(() => waitForSession(callback, attempts + 1), 200);
            } else {
                console.warn('[vault] Session not available after timeout. Aborting data fetch.');
            }
        }

        waitForSession(hydrateVault);
    </script>
</body>
</html>
